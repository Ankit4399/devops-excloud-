name: Deploy Nodejs code on ExCloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Docker Build and push
        run: |
          docker build -t raozz/chaicode-node .
          docker push raozz/chaicode-node

      - name: Deploy on ExCloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.128.243
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            #kill existing container if running
            sudo docker rm -f chaicode-node || true

            #pull the latest image and run the container
            sudo docker pull raozz/chaicode-node

            #run the container in detached mode, restart unless stopped, and map port 3000
            sudo docker run -d --name chaicode-node --restart unless-stopped -p 3000:3000 raozz/chaicode-node

            #cleanup unused docker images 
            sudo docker image prune -f
