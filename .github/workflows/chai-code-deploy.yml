name: Deploy Nodejs code on ExCloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to ExCloud
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: 210.79.129.234
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/devops-excloud-
            git pull
            npm install
            pm2 restart 0
